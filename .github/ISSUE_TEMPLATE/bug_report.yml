name: Bug report
description: Report a reproducible problem without attaching private Cubase data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Please remove usernames and personal settings from logs and screenshots."
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "1.0 (1)"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
